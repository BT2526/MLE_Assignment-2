x-airflow-common: &airflow-common
  build: .
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: PAqBeGJLJTYFzVkOGHWIYXdLO7XdXz5yTdxAGJe9ezM=
    AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "False"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "True"
    JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
    PYTHONPATH: /opt/airflow/scripts
  volumes:
    - ./dags:/opt/airflow/dags
    - ./scripts:/opt/airflow/scripts
    - ./utils:/opt/airflow/scripts/utils
    - ./data:/opt/airflow/scripts/data
    - ./datamart:/opt/airflow/scripts/datamart
    - ./model_bank:/opt/airflow/scripts/model_bank
    - ./logs:/opt/airflow/logs
  depends_on: &airflow-deps
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5
    restart: always

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin --password admin \
          --firstname Admin --lastname User \
          --role Admin --email admin@example.com || true
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: always
    depends_on:
      <<: *airflow-deps
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always
    depends_on:
      <<: *airflow-deps
      airflow-init:
        condition: service_completed_successfully

  # Optional MLflow tracking UI (reads the SQLite db written by model_train.py).
  # Browse experiment runs at http://localhost:5000
  mlflow-ui:
    <<: *airflow-common
    command: >
      bash -c "cd /opt/airflow/scripts &&
               mlflow ui --host 0.0.0.0 --port 5000
               --backend-store-uri sqlite:///mlflow.db"
    ports:
      - "5000:5000"
    restart: always
    depends_on:
      <<: *airflow-deps

volumes:
  postgres_db:
